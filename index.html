<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计师专属MBTI趣味测评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 冷色系页面背景渐变：深蓝到浅蓝 */
            background: linear-gradient(120deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px; /* 加宽以适应双栏布局 */
            margin: 30px auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(16, 60, 231, 0.1); /* 冷色系阴影 */
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        /* 冷色系渐变通用样式（蓝→青） */
        .text-gradient {
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #103CE7, #64E9FF) !important;
            background-size: 200% 200% !important;
            animation: gradientMove 3s ease infinite !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(16, 60, 231, 0.25); /* 按钮冷光阴影 */
        }
        .btn-gradient:hover {
            background: linear-gradient(135deg, #0026c9, #4cd6ee) !important;
            transform: translateY(-2px);
        }
        .bar-gradient {
            background: linear-gradient(135deg, #103CE7, #64E9FF) !important;
            background-size: 200% 200% !important;
            animation: gradientMove 3s ease infinite !important;
        }
        .card-gradient {
            background: linear-gradient(135deg, #f0f9ff, #f8fcff) !important; /* 冷色系卡片背景 */
            border: 1px solid #dbeafe !important; /* 冷色系边框 */
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 欢迎页UI强化 */
        .welcome-section {
            display: block;
            text-align: center;
            padding: 20px 0 40px;
            position: relative;
        }
        /* 欢迎页装饰元素 */
        .welcome-section::before {
            content: "✨";
            font-size: 30px;
            position: absolute;
            top: 10px;
            left: 20px;
            animation: float 3s ease-in-out infinite;
        }
        .welcome-section::after {
            content: "🎨";
            font-size: 30px;
            position: absolute;
            top: 10px;
            right: 20px;
            animation: float 3s ease-in-out infinite 0.5s;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .welcome-main-title {
            color: #2d3748;
            font-size: 38px;
            margin-bottom: 12px;
            line-height: 1.4;
            font-weight: 700;
            animation: fadeInDown 0.8s ease;
        }
        .welcome-sub-title {
            font-size: 18px;
            color: #103CE7; /* 冷色系副标题 */
            margin-bottom: 30px;
            line-height: 1.5;
            font-weight: 500;
            animation: fadeInUp 0.8s ease 0.3s both;
        }
        /* 欢迎页装饰横幅 */
        .welcome-banner {
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            color: #fff;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 16px;
            margin: 0 auto 30px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(16, 60, 231, 0.3);
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .welcome-desc {
            border-radius: 16px;
            padding: 25px;
            text-align: left;
            margin: 0 0 35px;
            border: 1px solid #dbeafe;
            position: relative;
            overflow: hidden;
        }
        /* 测评说明装饰角标 */
        .welcome-desc::before {
            content: "📝";
            font-size: 40px;
            position: absolute;
            top: -10px;
            right: -10px;
            opacity: 0.1;
        }
        .welcome-desc h3 {
            color: #103CE7; /* 冷色系标题 */
            margin-bottom: 15px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* 数字序号格式 */
        .welcome-desc ol {
            margin-left: 20px;
            color: #4a5568;
            font-size: 16px;
            line-height: 1.8;
            counter-reset: welcome-counter;
            list-style: none; /* 移除默认序号，自定义样式 */
        }
        .welcome-desc ol li {
            margin-bottom: 12px;
            position: relative;
            padding-left: 35px;
        }
        .welcome-desc ol li::before {
            counter-increment: welcome-counter;
            content: counter(welcome-counter);
            position: absolute;
            left: 0;
            top: 2px;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(16, 60, 231, 0.3);
        }
        .start-btn {
            padding: 18px 50px;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            animation: bounceIn 1s ease 0.5s both;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 答题区样式 - 适配冷色系 */
        .question-section {
            display: none;
            margin-bottom: 30px;
        }
        .progress {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .progress-text {
            color: #103CE7;
            font-size: 14px;
            font-weight: 500;
        }
        .progress-bar {
            height: 10px;
            background: #e0f2fe; /* 冷色系进度条背景 */
            border-radius: 5px;
            flex: 1;
            margin: 0 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-card {
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #dbeafe;
        }
        .question-card h4 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .question-card h4::before {
            content: "💡";
            font-size: 20px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            padding: 14px 20px;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 16px;
            border: 1px solid #dbeafe;
        }
        .option-btn:hover {
            background: #f0f9ff;
            border-color: #103CE7;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(16, 60, 231, 0.1);
        }
        .option-btn.selected {
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            color: #fff;
            border-color: #103CE7;
        }
        .nav-btn {
            padding: 12px 25px;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            margin-right: 12px;
            transition: all 0.3s ease;
        }
        .nav-btn:disabled {
            background: #cbd5e0 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 结果页样式 - 适配冷色系 */
        .result-section {
            display: none;
            margin-top: 30px;
            padding: 35px 30px;
            border-radius: 20px;
            border: 1px solid #dbeafe;
        }
        .result-title {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        .mbti-code {
            font-size: 40px;
            font-weight: 700;
            text-align: center;
            margin: 15px 0 30px;
            letter-spacing: 4px;
            font-family: "Arial Black", sans-serif;
        }
        .mbti-desc {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.9;
        }
        /* 结果页布局（改为上下结构） */
        .result-content-wrapper {
            display: flex;
            flex-direction: column; /* 上下排列 */
            gap: 25px;
        }

        /* 联盟信息样式 */
        .alliance-section {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #dbeafe;
        }
        .alliance-title {
            display: inline-block;
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(16, 60, 231, 0.2);
        }
        .alliance-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            font-style: italic;
        }

        .result-hero-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            display: block;
            margin: 10px auto 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(16, 60, 231, 0.15);
            transition: transform 0.3s ease;
        }
        .result-hero-img:hover {
            transform: scale(1.02);
        }

        .result-main-col {
            width: 100%;
        }
        .result-career-col {
            width: 100%;
            background: #f8fcff;
            padding: 25px;
            border-radius: 16px;
            border: 1px dashed #64E9FF;
        }

        .mbti-desc h4 {
            color: #2d3748;
            font-size: 20px;
            margin: 0 0 15px;
            padding-left: 12px;
            border-left: 4px solid #103CE7; /* 冷色系左侧边框 */
            font-weight: 600;
        }
        .mbti-desc ul {
            margin-left: 0;
            list-style: none;
        }
        .mbti-desc ul li {
            margin-bottom: 12px;
            position: relative;
            padding-left: 25px;
        }
        .mbti-desc ul li::before {
            font-size: 18px;
            position: absolute;
            left: 0;
            color: #103CE7;
        }
        /* 自定义图标 */
        .icon-star::before { content: "✨"; }
        .icon-sad::before { content: "😩"; }
        .icon-laptop::before { content: "💻"; }
        .icon-talk::before { content: "🗣️"; }
        
        /* 性格标签 按钮样式 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }
        .tag-btn {
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            color: #0284c7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #bae6fd;
            transition: all 0.3s ease;
        }
        .tag-btn:hover {
            background: linear-gradient(135deg, #103CE7, #64E9FF);
            color: #fff;
            border-color: #103CE7;
            transform: translateY(-2px);
        }

        /* 职业建议样式 */
        .career-title {
            color: #0369a1;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .career-list {
            padding-left: 20px;
        }
        .career-list li {
            margin-bottom: 10px;
            list-style: decimal; /* 数字序号 */
            color: #4a5568;
        }
        /* 移除之前的火箭图标 */
        .career-list li::before {
            content: none !important;
        }

        .restart-btn {
            display: block;
            margin: 35px auto 0;
            padding: 14px 35px;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
                margin: 15px auto;
            }
            .welcome-main-title {
                font-size: 28px;
            }
            .welcome-sub-title {
                font-size: 16px;
            }
            .welcome-section::before, .welcome-section::after {
                font-size: 20px;
            }
            .start-btn {
                padding: 14px 35px;
                font-size: 18px;
            }
            .question-card h4 {
                font-size: 16px;
            }
            .option-btn {
                font-size: 14px;
                padding: 12px 15px;
            }
            .mbti-code {
                font-size: 32px;
            }
            .mbti-desc h4 {
                font-size: 18px;
            }
            .restart-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            .result-content-wrapper {
                flex-direction: column;
                gap: 20px;
            }
        }
    
        /* 激活页样式 */
        .activation-section {
            display: block; /* 默认显示 */
            text-align: center;
            padding: 40px 20px;
        }
        .activation-box {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(16, 60, 231, 0.05);
        }
        #activation-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            color: #2d3748;
            font-weight: 600;
            letter-spacing: 2px;
        }
        #activation-input:focus {
            border-color: #103CE7;
            box-shadow: 0 0 0 3px rgba(16, 60, 231, 0.1);
        }
        #activation-input::placeholder {
            color: #a0aec0;
            font-weight: normal;
            letter-spacing: normal;
        }
        
        /* 初始状态：隐藏欢迎页，显示激活页 */
        .welcome-section {
            display: none; /* 初始隐藏，等待激活 */
        }
        
        /* 错误提示动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.5s ease-in-out;
            border-color: #ef4444 !important;
        }

    </style>
</head>
<body>
    <div class="container">

        <!-- 0. 激活页 -->
        <div class="activation-section" id="activation-section">
            <h1 class="welcome-main-title text-gradient">设计师MBTI测评</h1>
            <p class="welcome-sub-title">请输入激活码解锁测评权限</p>
            
            <div class="activation-box card-gradient">
                <input type="text" id="activation-input" placeholder="请输入8位激活码" maxlength="20">
                <button class="start-btn btn-gradient" id="verify-btn" style="margin-top: 25px; width: 100%; padding: 15px; font-size: 18px;">验证并进入</button>
                <p id="activation-error" style="color: #ef4444; margin-top: 15px; font-size: 14px; display: none;">⚠️ 激活码无效，请检查后重试</p>
            </div>
        </div>

        <!-- 1. 欢迎页（暖色系+更活泼UI） -->
        <div class="welcome-section" id="welcome-section">
            <h1 class="welcome-main-title text-gradient">设计师专属MBTI趣味测评</h1>
            <p class="welcome-sub-title">测测你是哪款“又肝又可爱”的设计人～</p>
            <!-- 新增活泼装饰横幅 -->
            <div class="welcome-banner">🎉 20道题解锁你的专属设计人格 🎉</div>
            
            <div class="welcome-desc card-gradient">
                <h3>📝 测评说明</h3>
                <ol>
                    <li>共20道题，围绕设计师日常工作场景设计，精准贴合16型人格核心特质</li>
                    <li>每题选择最贴合你真实反应的选项，无需过度思考，凭第一直觉作答即可</li>
                    <li>答题完成后自动生成你的设计师MBTI人格及专属搞笑特质，无好坏之分</li>
                    <li>全程仅需3-5分钟，主打精准戳中设计日常，轻松搞笑～</li>
                </ol>
            </div>

            <button class="start-btn btn-gradient" id="start-btn">开始测评</button>
        </div>

        <!-- 2. 答题区域 -->
        <div class="question-section" id="question-section">
            <div class="progress">
                <span class="progress-text">第 <span id="current-question">1</span> 题 / 共 20 题</span>
                <div class="progress-bar">
                    <div class="progress-fill bar-gradient" id="progress-fill"></div>
                </div>
                <span class="progress-text" id="progress-percent">5%</span>
            </div>

            <div class="question-card card-gradient" id="question-card">
                <!-- 题目内容由JS动态生成 -->
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="nav-btn btn-gradient" id="prev-btn" disabled>上一题</button>
                <button class="nav-btn btn-gradient" id="next-btn">下一题</button>
            </div>
        </div>

        <!-- 3. 结果展示区域 -->
        <div class="result-section card-gradient" id="result-section">
            <h2 class="result-title">你的设计师MBTI结果</h2>
            <div class="mbti-code text-gradient" id="mbti-code"></div>
            <div class="mbti-desc" id="mbti-desc"></div>
            <button class="restart-btn btn-gradient" id="restart-btn">重新测评</button>
        </div>
    </div>

    <script>
        // 1. 测评题目数据（保持不变）
        const questions = [
            {
                id: 1,
                title: "甲方说“把图改得有感觉一点”，你的第一反应是？",
                options: [
                    { text: "A. 追问：“什么感觉？请明确视觉逻辑/落地要求，无依据的修改无法落地”", value: "T" },
                    { text: "B. 内耗：“完了，TA到底要什么感觉？我的设计是不是没戳中审美？”", value: "F" },
                    { text: "C. 行动：默默研究甲方品牌/过往案例，精准拿捏隐性需求后动笔改", value: "S" },
                    { text: "D. 脑洞：直接出3版不同“感觉”的方案，让甲方选，顺便加自己的创意", value: "N" }
                ]
            },
            {
                id: 2,
                title: "公司开设计脑暴会，你更倾向于？",
                options: [
                    { text: "A. 主导发言：张口就是N个创意，跟同事互侃互怼，越辩思路越清晰", value: "E" },
                    { text: "B. 默默旁听：不主动说话，记下同事物料，会后自己梳理靠谱想法", value: "I" },
                    { text: "C. 氛围组：跟着附和，偶尔蹦出小灵感，被点名才详细说思路", value: "E" },
                    { text: "D. 逻辑控：先定脑暴框架，只说贴合主题、有落地性的创意，拒绝无意义脑洞", value: "S" }
                ]
            },
            {
                id: 3,
                title: "画稿时突然没灵感，你会怎么做？",
                options: [
                    { text: "A. 社交充电：找同事唠嗑/刷潮流设计案例/外放音乐，越热闹越容易来灵感", value: "E" },
                    { text: "B. 独处摸索：戴耳机翻艺术作品/研究设计技法，一个人慢慢磨，等灵感上门", value: "I" },
                    { text: "C. 动手试错：随便打开画布瞎画，边画边想，实操中找灵感，拒绝空发呆", value: "S" },
                    { text: "D. 摆烂摸鱼：先刷手机/喝咖啡，灵感来了再动笔，绝不硬熬“无灵感的稿”", value: "P" }
                ]
            },
            {
                id: 4,
                title: "甲方毫无理由让你推翻已确认的终稿重改，你的反应是？",
                options: [
                    { text: "A. 硬核驳回：“这个修改不符合品牌视觉规范/用户逻辑，做了也无商业价值”", value: "T" },
                    { text: "B. 佛系配合：虽然觉得没必要，但不反驳，按要求改，悄悄保留核心设计细节", value: "F" },
                    { text: "C. 辩论怼回：从设计原理/行业趋势/落地成本讲起，怼到甲方放弃无理由修改", value: "T" },
                    { text: "D. 贴心沟通：先问甲方修改初衷，帮TA梳理需求，避免越改越乱，实在要改就做", value: "F" }
                ]
            },
            {
                id: 5,

        const activationSection = document.getElementById('activation-section');
        const verifyBtn = document.getElementById('verify-btn');
        const activationInput = document.getElementById('activation-input');
        const activationError = document.getElementById('activation-error');

        function verifyCode() {
            const input = activationInput.value.trim();
            if (validCodes.has(input)) {
                // 验证成功
                activationSection.style.display = 'none';
                welcomeSection.style.display = 'block'; // 显示欢迎页
                // 移除 !important 效果 (通过直接修改 style.display 为 block 即可生效，因为内联样式优先级高)
                
                // 可选：平滑滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // 验证失败
                activationError.style.display = 'block';
                activationInput.classList.add('shake');
                setTimeout(() => activationInput.classList.remove('shake'), 500);
            }
        }

        if (verifyBtn && activationInput) {
            verifyBtn.addEventListener('click', verifyCode);
            activationInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyCode();
            });
            activationInput.addEventListener('input', () => {
                activationError.style.display = 'none';
            });
        }
        // --- 激活码逻辑 End ---


        // 5. 初始化页面（保持不变）
        function init() {
            bindEvents();
        }

        // 6. 绑定事件（保持不变）
        function bindEvents() {
            startBtn.addEventListener('click', function() {
                welcomeSection.style.display = 'none';
                questionSection.style.display = 'block';
                renderQuestion(currentQuestionIndex);
                updateProgress();
            });

            nextBtn.addEventListener('click', function() {
                if (userAnswers[currentQuestionIndex] === undefined) {
                    alert('请选择一个选项后继续～');
                    return;
                }

                if (currentQuestionIndex === questions.length - 1) {
                    calculateResult();
                    showResult();
                    return;
                }

                currentQuestionIndex++;
                renderQuestion(currentQuestionIndex);
                updateProgress();
            });

            prevBtn.addEventListener('click', function() {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    renderQuestion(currentQuestionIndex);
                    updateProgress();
                }
            });

            restartBtn.addEventListener('click', function() {
                currentQuestionIndex = 0;
                userAnswers = [];
                dimensionScores = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, P: 0, J: 0 };
                
                resultSection.style.display = 'none';
                questionSection.style.display = 'none';
                welcomeSection.style.display = 'block';
            });
        }

        // 7. 渲染当前题目（保持不变）
        function renderQuestion(index) {
            const question = questions[index];
            currentQuestionText.textContent = index + 1;
            
            let questionHTML = `<h4>${question.id}. ${question.title}</h4>`;
            questionHTML += '<div class="options">';
            
            question.options.forEach((option, optIndex) => {
                const isSelected = userAnswers[index] === optIndex;
                questionHTML += `<button class="option-btn ${isSelected ? 'selected' : ''}" data-index="${optIndex}">${option.text}</button>`;
            });
            
            questionHTML += '</div>';
            questionCard.innerHTML = questionHTML;

            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    optionBtns.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    userAnswers[index] = parseInt(this.dataset.index);
                });
            });

            prevBtn.disabled = index === 0;
        }

        // 8. 更新进度条（保持不变）
        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressFill.style.width = `${progress}%`;
            progressPercent.textContent = `${Math.round(progress)}%`;
        }

        // 9. 计算MBTI结果（保持不变）
        function calculateResult() {
            dimensionScores = { E: 0, I: 0, N: 0, S: 0, F: 0, T: 0, P: 0, J: 0 };

            userAnswers.forEach((answerIndex, qIndex) => {
                const question = questions[qIndex];
                const selectedValue = question.options[answerIndex].value;
                dimensionScores[selectedValue] += 1;
            });

            const EorI = dimensionScores.E >= dimensionScores.I ? 'E' : 'I';
            const NorS = dimensionScores.N >= dimensionScores.S ? 'N' : 'S';
            const ForT = dimensionScores.F >= dimensionScores.T ? 'F' : 'T';
            const PorJ = dimensionScores.P >= dimensionScores.J ? 'P' : 'J';

            return EorI + NorS + ForT + PorJ;
        }

        // 10. 显示结果（保持不变）
        function showResult() {
            const mbti = calculateResult();
            mbtiCode.textContent = mbti;
            mbtiDesc.innerHTML = mbtiResults[mbti] || '<p>暂无该类型的描述～</p>';
            
            questionSection.style.display = 'none';
            resultSection.style.display = 'block';
        }

        // 初始化
        init();
    </script>
